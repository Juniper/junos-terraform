system:
  host_name: dc2-firewall1
  syslog:
    file:
    - contents:
      - name: authorization
        info: true
      name: messages
    - name: interactive-commands
      contents:
      - name: interactive-commands
        any: true
    _merge_list_directives:
      file:
        _merge_directive: merge_by_key
        _merge_key: name
    _merge_directive: merge_recursive
  _merge_directive: merge_recursive
security:
  policies:
    policy:
    - from_zone_name: trust
      to_zone_name: trust
      policy:
      - name: default-permit
        match:
          source_address:
          - any
          destination_address:
          - any
          application:
          - any
        then:
          permit: ''
    - from_zone_name: trust
      to_zone_name: untrust
      policy:
      - name: default-permit
        match:
          source_address:
          - any
          destination_address:
          - any
          application:
          - any
        then:
          permit: ''
    _merge_directive: merge_recursive
  _merge_directive: merge_recursive
interfaces:
  interface:
  - unit:
    - description: '*** to dc2-spine1 vlan 1 ***'
      family:
        inet:
          address:
          - name: 10.95.1.2/30
      name: '1'
    name: ge-0/0/0
  - unit:
    - description: '*** to dc2-spine2 vlan 1 ***'
      family:
        inet:
          address:
          - name: 10.93.1.2/30
      name: '1'
    name: ge-0/0/1
  - unit:
    - family:
        inet:
          address:
          - name: 100.123.26.3/16
      name: '0'
    name: fxp0
  _merge_list_directives:
    interface:
      _merge_directive: merge_by_key
      _merge_key: name
  _merge_directive: merge_recursive
_merge_directive: merge_recursive
