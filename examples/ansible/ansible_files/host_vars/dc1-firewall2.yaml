system:
  host_name: dc1-firewall2
  syslog:
    file:
    - contents:
      - name: authorization
        info: true
      name: messages
    - name: interactive-commands
      contents:
      - name: interactive-commands
        any: true
    _merge_list_directives:
      file:
        _merge_directive: merge_by_key
        _merge_key: name
    _merge_directive: merge_recursive
  _merge_directive: merge_recursive
security:
  policies:
    policy:
    - from_zone_name: trust
      to_zone_name: trust
      policy:
      - name: default-permit
        match:
          source_address:
          - any
          destination_address:
          - any
          application:
          - any
        then:
          permit: ''
    - from_zone_name: trust
      to_zone_name: untrust
      policy:
      - name: default-permit
        match:
          source_address:
          - any
          destination_address:
          - any
          application:
          - any
        then:
          permit: ''
    - from_zone_name: VRF_10001
      to_zone_name: VRF_10002
      policy:
      - name: default-permit
        match:
          source_address:
          - any
          destination_address:
          - any
          application:
          - any
        then:
          permit: ''
    - from_zone_name: VRF_10002
      to_zone_name: VRF_10001
      policy:
      - name: default-permit
        match:
          source_address:
          - any
          destination_address:
          - any
          application:
          - any
        then:
          permit: ''
    - from_zone_name: VRF_10002
      to_zone_name: VRF_10003
      policy:
      - name: default-permit
        match:
          source_address:
          - any
          destination_address:
          - any
          application:
          - any
        then:
          permit: ''
    - from_zone_name: VRF_10003
      to_zone_name: VRF_10002
      policy:
      - name: default-permit
        match:
          source_address:
          - any
          destination_address:
          - any
          application:
          - any
        then:
          permit: ''
    _merge_directive: merge_recursive
  zones:
    security_zone:
    - name: VRF_10002
      host_inbound_traffic:
        system_services:
        - name: all
        protocols:
        - name: all
      interfaces:
      - name: ge-0/0/0.2
      - name: ge-0/0/1.2
    - name: VRF_10003
      host_inbound_traffic:
        system_services:
        - name: all
        protocols:
        - name: all
      interfaces:
      - name: ge-0/0/0.3
      - name: ge-0/0/1.3
    _merge_list_directives:
      security_zone:
        _merge_directive: merge_by_key
        _merge_key: name
    _merge_directive: merge_recursive
  _merge_directive: merge_recursive
interfaces:
  interface:
  - unit:
    - description: '*** to dc1-borderleaf1 vlan 1 ***'
      family:
        inet:
          address:
          - name: 10.98.1.2/30
      name: '1'
    - name: '2'
      description: '*** to dc1-borderleaf1 vlan 2 ***'
      vlan_id: '2'
      family:
        inet:
          address:
          - name: 10.98.2.2/30
    - name: '3'
      description: '*** to dc1-borderleaf1 vlan 3 ***'
      vlan_id: '3'
      family:
        inet:
          address:
          - name: 10.98.3.2/30
    name: ge-0/0/0
  - unit:
    - description: '*** to dc1-borderleaf2 vlan 1 ***'
      family:
        inet:
          address:
          - name: 10.96.1.2/30
      name: '1'
    - name: '2'
      description: '*** to dc1-borderleaf2 vlan 2 ***'
      vlan_id: '2'
      family:
        inet:
          address:
          - name: 10.96.2.2/30
    - name: '3'
      description: '*** to dc1-borderleaf2 vlan 3 ***'
      vlan_id: '3'
      family:
        inet:
          address:
          - name: 10.96.3.2/30
    name: ge-0/0/1
  - unit:
    - family:
        inet:
          address:
          - name: 100.123.26.2/16
      name: '0'
    name: fxp0
  _merge_list_directives:
    interface:
      _merge_directive: merge_by_key
      _merge_key: name
  _merge_directive: merge_recursive
routing_instances:
  instance:
  - interface:
    - name: ge-0/0/0.2
    - name: ge-0/0/0.3
    - name: ge-0/0/1.2
    - name: ge-0/0/1.3
    protocols:
      ospf:
        area:
        - interface:
          - name: ge-0/0/0.2
          - name: ge-0/0/1.2
          - name: ge-0/0/0.3
          - name: ge-0/0/1.3
          name: 0.0.0.0
    name: fabric
  _merge_list_directives:
    instance:
      _merge_directive: merge_by_key
      _merge_key: name
  _merge_directive: merge_recursive
_merge_directive: merge_recursive
