policy_options:
  policy_statement:
  - name: ospf-default
    term:
    - name: '1'
      from:
        route_filter:
        - address: 0.0.0.0/0
          exact: true
          accept: true
routing_instances:
  instance:
  - name: fabric
    instance_type: virtual-router
    interface:
    - name: ge-0/0/0.1
    - name: ge-0/0/0.2
    - name: ge-0/0/0.3
    - name: ge-0/0/1.1
    - name: ge-0/0/1.2
    - name: ge-0/0/1.3
    routing_options:
      static:
        route:
        - name: 0.0.0.0/0
          discard: true
    protocols:
      ospf:
        export:
        - ospf-default
        area:
        - name: 0.0.0.0
          interface:
          - name: ge-0/0/0.1
          - name: ge-0/0/1.1
          - name: ge-0/0/0.2
          - name: ge-0/0/1.2
          - name: ge-0/0/0.3
          - name: ge-0/0/1.3
interfaces:
  interface:
  - unit:
    - description: '*** to dc1-borderleaf1 vlan 1 ***'
      vlan_id: '1'
      name: '1'
    - description: '*** to dc1-borderleaf1 vlan 2 ***'
      vlan_id: '2'
      name: '2'
    - description: '*** to dc1-borderleaf1 vlan 3 ***'
      vlan_id: '3'
      name: '3'
    vlan_tagging: true
    name: ge-0/0/0
  - unit:
    - description: '*** to dc1-borderleaf2 vlan 1 ***'
      vlan_id: '1'
      name: '1'
    - description: '*** to dc1-borderleaf2 vlan 2 ***'
      vlan_id: '2'
      name: '2'
    - description: '*** to dc1-borderleaf2 vlan 3 ***'
      vlan_id: '3'
      name: '3'
    vlan_tagging: true
    name: ge-0/0/1
  - unit:
    - description: '*** management ***'
      name: '0'
    name: fxp0
system:
  license:
    autoupdate:
      url:
      - name: https://ae1.juniper.net/junos/key_retrieval
  syslog:
    file:
    - contents:
      - any: true
        name: any
      name: messages
version: 18.2R3.4
security:
  policies:
    policy:
    - from_zone_name: trust
      to_zone_name: trust
      policy:
      - name: default-permit
        match:
          source_address:
          - any
          destination_address:
          - any
          application:
          - any
        then:
          permit: ''
    - from_zone_name: trust
      to_zone_name: untrust
      policy:
      - name: default-permit
        match:
          source_address:
          - any
          destination_address:
          - any
          application:
          - any
        then:
          permit: ''
    - from_zone_name: VRF_10001
      to_zone_name: VRF_10002
      policy:
      - name: default-permit
        match:
          source_address:
          - any
          destination_address:
          - any
          application:
          - any
        then:
          permit: ''
    - from_zone_name: VRF_10002
      to_zone_name: VRF_10001
      policy:
      - name: default-permit
        match:
          source_address:
          - any
          destination_address:
          - any
          application:
          - any
        then:
          permit: ''
    - from_zone_name: VRF_10002
      to_zone_name: VRF_10003
      policy:
      - name: default-permit
        match:
          source_address:
          - any
          destination_address:
          - any
          application:
          - any
        then:
          permit: ''
    - from_zone_name: VRF_10003
      to_zone_name: VRF_10002
      policy:
      - name: default-permit
        match:
          source_address:
          - any
          destination_address:
          - any
          application:
          - any
        then:
          permit: ''
  log:
    report: ''
    mode: stream
  zones:
    security_zone:
    - name: trust
      tcp_rst: true
      host_inbound_traffic:
        system_services:
        - name: all
        protocols:
        - name: all
    - name: untrust
      screen: untrust-screen
    - name: VRF_10001
      host_inbound_traffic:
        system_services:
        - name: all
        protocols:
        - name: all
      interfaces:
      - name: ge-0/0/0.1
      - name: ge-0/0/1.1
    - name: VRF_10002
      host_inbound_traffic:
        system_services:
        - name: all
        protocols:
        - name: all
      interfaces:
      - name: ge-0/0/0.2
      - name: ge-0/0/1.2
    - name: VRF_10003
      host_inbound_traffic:
        system_services:
        - name: all
        protocols:
        - name: all
      interfaces:
      - name: ge-0/0/0.3
      - name: ge-0/0/1.3
  screen:
    ids_option:
    - name: untrust-screen
      icmp:
        ping_death: true
      ip:
        source_route_option: true
        tear_drop: true
      tcp:
        syn_flood:
          alarm_threshold: '1024'
          attack_threshold: '200'
          source_threshold: '1024'
          destination_threshold: '2048'
          undocumented:
            queue_size: '2000'
          timeout: '20'
        land: true
_merge_directive: merge_recursive
