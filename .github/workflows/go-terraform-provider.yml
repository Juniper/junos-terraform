name: Go provider and Terraform plan

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-plan:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python (latest)
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Python dependencies for tooling
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        python -m pip install .
        python -m pip install asyncssh

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: 'stable'

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Generate provider with jtaf-yang2go
      run: |
        rm -rf terraform-provider-junos-vqfx-evpn-vxlan

        jtaf-yang2go \
          -p examples/yang/18.2/18.2R3/common \
          examples/yang/18.2/18.2R3/junos-qfx/conf/*.yang \
          -x \
          examples/evpn-vxlan-dc/dc1/dc1-borderleaf1.xml \
          examples/evpn-vxlan-dc/dc1/dc1-borderleaf2.xml \
          examples/evpn-vxlan-dc/dc1/dc1-leaf1.xml \
          examples/evpn-vxlan-dc/dc1/dc1-leaf2.xml \
          examples/evpn-vxlan-dc/dc1/dc1-leaf3.xml \
          examples/evpn-vxlan-dc/dc1/dc1-spine1.xml \
          examples/evpn-vxlan-dc/dc1/dc1-spine2.xml \
          examples/evpn-vxlan-dc/dc2/dc2-spine1.xml \
          examples/evpn-vxlan-dc/dc2/dc2-spine2.xml \
          -t vqfx-evpn-vxlan

    - name: Build and test generated terraform provider
      working-directory: terraform-provider-junos-vqfx-evpn-vxlan
      run: |
        go build -v ./...
        go test -v ./...

    - name: Generate EVPN-VXLAN Terraform files
      run: |
        jtaf-xml2tf \
          -j terraform-provider-junos-vqfx-evpn-vxlan/trimmed_schema.json \
          -x examples/evpn-vxlan-dc/dc1/*{spine,leaf}*.xml examples/evpn-vxlan-dc/dc2/*spine*.xml \
          -t vqfx-evpn-vxlan \
          -d ci-evpn-vxlan-tf \
          -u ci-user \
          -p ci-password

    - name: Prepare Terraform integration environment
      run: |
        set -euo pipefail

        pushd terraform-provider-junos-vqfx-evpn-vxlan
        go install .
        popd

        mkdir -p "$HOME/go/bin"
        cat > "$HOME/.terraformrc" <<EOF
        provider_installation {
          dev_overrides {
            "hashicorp/junos-vqfx-evpn-vxlan" = "$HOME/go/bin"
          }
          direct {}
        }
        EOF

        echo "TF_CLI_CONFIG_FILE=$HOME/.terraformrc" >> "$GITHUB_ENV"
        echo "TF_IN_AUTOMATION=1" >> "$GITHUB_ENV"

        # Build a deterministic host->port map from generated providers.tf and rewrite providers to use mock sockets.
        python - <<'PY'
        import re
        from pathlib import Path

        providers_path = Path("ci-evpn-vxlan-tf/providers.tf")
        text = providers_path.read_text(encoding="utf-8")

        block_re = re.compile(r'provider\s+"junos-vqfx-evpn-vxlan"\s*\{.*?\}', re.DOTALL)
        host_re = re.compile(r'host\s*=\s*"([^"]+)"')
        port_re = re.compile(r'port\s*=\s*\d+')

        hosts = []
        for block in block_re.findall(text):
          hm = host_re.search(block)
          if hm:
            host = hm.group(1)
            if host not in hosts:
              hosts.append(host)

        base_port = 8301
        host_port = {host: base_port + i for i, host in enumerate(hosts)}

        def rewrite_block(block: str) -> str:
          hm = host_re.search(block)
          if not hm:
            return block
          host = hm.group(1)
          port = host_port[host]
          block = host_re.sub('host     = "127.0.0.1"', block)
          block = port_re.sub(f'port     = {port}', block)
          return block

        rewritten = block_re.sub(lambda m: rewrite_block(m.group(0)), text)
        providers_path.write_text(rewritten, encoding="utf-8")

        with Path("ci-evpn-vxlan-tf/mock-devices.txt").open("w", encoding="utf-8") as f:
          for host in hosts:
            f.write(f"{host}:{host_port[host]}\n")
        PY

        python .github/scripts/netconf_mock_server.py \
          --host 127.0.0.1 \
          --username ci-user \
          --password ci-password \
          --log-level DEBUG \
          --devices-file ci-evpn-vxlan-tf/mock-devices.txt \
          --state-dump netconf-mock-state.json \
          > netconf-mock.log 2>&1 &
        echo "$!" > .netconf_mock.pid

        # Wait for all per-device listeners to be ready, or fail early with server logs.
        all_ready=0
        for _ in $(seq 1 30); do
          if ! kill -0 "$(cat .netconf_mock.pid)" 2>/dev/null; then
            echo "NETCONF mock exited during startup"
            cat netconf-mock.log || true
            exit 1
          fi

          all_ready=1
          while IFS=: read -r _dev_name dev_port; do
            if [ -z "${dev_port}" ]; then
              continue
            fi
            if ! (echo > /dev/tcp/127.0.0.1/"${dev_port}") >/dev/null 2>&1; then
              all_ready=0
              break
            fi
          done < ci-evpn-vxlan-tf/mock-devices.txt

          if [ "$all_ready" -eq 1 ]; then
            break
          fi
          sleep 1
        done

        if [ "$all_ready" -ne 1 ]; then
          echo "NETCONF mock listeners were not ready in time"
          cat netconf-mock.log || true
          exit 1
        fi

    - name: Terraform initial apply
      working-directory: ci-evpn-vxlan-tf
      run: |
        set -euo pipefail
        # With provider dev_overrides, skip `terraform init` to avoid registry lookups for unpublished providers.
        terraform plan -refresh=false -no-color -input=false -out=tfplan-initial
        terraform apply -no-color -input=false -auto-approve -parallelism=1 tfplan-initial

    - name: Terraform no-op plan after initial apply
      id: no_op_plan_initial
      continue-on-error: true
      working-directory: ci-evpn-vxlan-tf
      run: terraform plan -refresh=false -no-color -input=false -detailed-exitcode

    - name: Assert no-op exit code after initial apply
      run: |
        if [ "${{ steps.no_op_plan_initial.outputs.exitcode }}" != "0" ]; then
          echo "Expected no-op plan after apply, got exit code ${{ steps.no_op_plan_initial.outputs.exitcode }}"
          exit 1
        fi

    - name: Mutate one resource to force replacement
      working-directory: ci-evpn-vxlan-tf
      run: |
        set -euo pipefail
        first_tf="$(ls *.tf | grep -v '^providers.tf$' | head -n 1)"
        sed -E -i '0,/resource_name = "[^"]+"/s//resource_name = "ci-updated-group"/' "$first_tf"

    - name: Terraform changed plan after mutation
      id: changed_plan
      continue-on-error: true
      working-directory: ci-evpn-vxlan-tf
      run: terraform plan -refresh=false -no-color -input=false -detailed-exitcode -out=tfplan-updated

    - name: Assert changed plan exit code
      run: |
        if [ "${{ steps.changed_plan.outputs.exitcode }}" != "2" ]; then
          echo "Expected changed plan exit code 2, got ${{ steps.changed_plan.outputs.exitcode }}"
          exit 1
        fi

    - name: Terraform apply changed plan
      working-directory: ci-evpn-vxlan-tf
      run: terraform apply -no-color -input=false -auto-approve -parallelism=1 tfplan-updated

    - name: Terraform final no-op plan
      id: no_op_plan_final
      continue-on-error: true
      working-directory: ci-evpn-vxlan-tf
      run: terraform plan -refresh=false -no-color -input=false -detailed-exitcode

    - name: Assert final no-op exit code
      run: |
        if [ "${{ steps.no_op_plan_final.outputs.exitcode }}" != "0" ]; then
          echo "Expected no-op plan after second apply, got exit code ${{ steps.no_op_plan_final.outputs.exitcode }}"
          exit 1
        fi

    - name: Validate terraform state entries
      working-directory: ci-evpn-vxlan-tf
      run: |
        set -euo pipefail
        test -f terraform.tfstate
        state_count="$(terraform state list | wc -l)"
        if [ "$state_count" -le 0 ]; then
          echo "Expected terraform state entries, got none"
          exit 1
        fi

    - name: Capture baseline state metadata
      id: state_baseline
      working-directory: ci-evpn-vxlan-tf
      run: |
        set -euo pipefail
        before_serial="$(terraform state pull | python -c 'import json,sys; print(json.load(sys.stdin)["serial"])')"
        echo "serial=$before_serial" >> "$GITHUB_OUTPUT"
        # Record one managed resource path so we can assert it survives drift/reconcile cycles.
        first_resource="$(terraform state list | head -n 1)"
        echo "resource=$first_resource" >> "$GITHUB_OUTPUT"

    - name: Simulate out-of-band NETCONF drift
      run: |
        set -euo pipefail
        python - <<'PY'
        import asyncio
        from pathlib import Path

        import asyncssh

        MSG_SEP = "]]>]]>"

        async def recv_frame(reader: asyncssh.SSHReader[str]) -> str:
            buf = ""
            while MSG_SEP not in buf:
                chunk = await reader.read(4096)
                if not chunk:
                    raise RuntimeError("connection closed while waiting for NETCONF frame")
                buf += chunk
            frame, _rest = buf.split(MSG_SEP, 1)
            return frame.strip()

        async def send_rpc(writer: asyncssh.SSHWriter[str], reader: asyncssh.SSHReader[str], message_id: str, payload: str) -> str:
            rpc = (
                f'<?xml version="1.0" encoding="UTF-8"?>'
                f'<rpc message-id="{message_id}" xmlns="urn:ietf:params:xml:ns:netconf:base:1.0">'
                f'{payload}'
                f'</rpc>'
            )
            writer.write(rpc + MSG_SEP + "\n")
            return await recv_frame(reader)

        async def main() -> None:
            first_entry = Path("ci-evpn-vxlan-tf/mock-devices.txt").read_text(encoding="utf-8").splitlines()[0].strip()
            _name, port = first_entry.split(":", 1)

            conn = await asyncssh.connect(
                "127.0.0.1",
                port=int(port),
                username="ci-user",
                password="ci-password",
                known_hosts=None,
            )
            try:
                chan, session = await conn.create_session(asyncssh.SSHClientStreamSession, subsystem="netconf")
                del chan
                reader: asyncssh.SSHReader[str] = session.stdout
                writer: asyncssh.SSHWriter[str] = session.stdin

                # Consume server hello and send client hello.
                await recv_frame(reader)
                writer.write(
                    '<?xml version="1.0" encoding="UTF-8"?>'
                    '<hello xmlns="urn:ietf:params:xml:ns:netconf:base:1.0">'
                    '<capabilities><capability>urn:ietf:params:netconf:base:1.0</capability></capabilities>'
                    '</hello>'
                    + MSG_SEP
                    + "\n"
                )

                drift_cfg = (
                    '<load-configuration action="merge" format="xml">'
                    '<configuration><groups><name>ci-updated-group</name>'
                    '<system><host-name>OOB-DRIFT</host-name></system>'
                    '</groups></configuration>'
                    '</load-configuration>'
                )

                for mid, payload in [
                    ("1001", "<lock><target><candidate/></target></lock>"),
                    ("1002", drift_cfg),
                    ("1003", "<commit/>"),
                    ("1004", "<unlock><target><candidate/></target></unlock>"),
                ]:
                    reply = await send_rpc(writer, reader, mid, payload)
                    if "<ok/>" not in reply:
                        raise RuntimeError(f"unexpected reply for message-id {mid}: {reply}")
            finally:
                conn.close()
                await conn.wait_closed()

        asyncio.run(main())
        PY

    - name: Terraform plan should detect out-of-band drift
      id: drift_plan
      continue-on-error: true
      working-directory: ci-evpn-vxlan-tf
      run: terraform plan -no-color -input=false -detailed-exitcode -out=tfplan-drift

    - name: Assert drift detection exit code
      run: |
        if [ "${{ steps.drift_plan.outputs.exitcode }}" != "2" ]; then
          echo "Expected drift plan exit code 2 after out-of-band change, got ${{ steps.drift_plan.outputs.exitcode }}"
          exit 1
        fi

    - name: Terraform reconcile out-of-band drift
      working-directory: ci-evpn-vxlan-tf
      run: terraform apply -no-color -input=false -auto-approve -parallelism=1 tfplan-drift

    - name: Terraform no-op plan after drift reconcile
      id: drift_plan_final
      continue-on-error: true
      working-directory: ci-evpn-vxlan-tf
      run: terraform plan -no-color -input=false -detailed-exitcode

    - name: Assert no-op after drift reconcile
      run: |
        if [ "${{ steps.drift_plan_final.outputs.exitcode }}" != "0" ]; then
          echo "Expected no-op plan after reconciling drift, got ${{ steps.drift_plan_final.outputs.exitcode }}"
          exit 1
        fi

    - name: Assert Terraform state advanced and remains managed
      working-directory: ci-evpn-vxlan-tf
      run: |
        set -euo pipefail
        after_serial="$(terraform state pull | python -c 'import json,sys; print(json.load(sys.stdin)["serial"])')"
        if [ "$after_serial" -le "${{ steps.state_baseline.outputs.serial }}" ]; then
          echo "Expected state serial to increase after drift reconcile (before=${{ steps.state_baseline.outputs.serial }}, after=$after_serial)"
          exit 1
        fi
        terraform state show "${{ steps.state_baseline.outputs.resource }}" >/dev/null

    - name: Prepare negative test inputs
      run: |
        set -euo pipefail
        rm -rf ci-evpn-vxlan-tf-negative
        cp -R ci-evpn-vxlan-tf ci-evpn-vxlan-tf-negative
        pushd ci-evpn-vxlan-tf-negative
        neg_tf="$(ls *.tf | grep -v '^providers.tf$' | head -n 1)"
        sed -E -i '0,/resource_name = "[^"]+"/s//resource_name = "ci-negative-group"/' "$neg_tf"
        sed -E -i 's/password[[:space:]]*=[[:space:]]*"[^"]*"/password = "wrong-password"/g' providers.tf
        popd

    - name: Terraform negative apply with bad credentials
      id: negative_apply
      working-directory: ci-evpn-vxlan-tf-negative
      run: |
        set +e
        terraform apply -refresh=false -no-color -input=false -auto-approve -parallelism=1 > negative_apply.log 2>&1
        rc=$?
        set -e
        echo "exitcode=$rc" >> "$GITHUB_OUTPUT"

    - name: Assert negative apply failed
      run: |
        if [ "${{ steps.negative_apply.outputs.exitcode }}" = "0" ]; then
          echo "Expected apply to fail with wrong credentials, but it succeeded"
          cat ci-evpn-vxlan-tf-negative/negative_apply.log
          exit 1
        fi

    - name: Stop NETCONF mock
      if: always()
      run: |
        if [ -f .netconf_mock.pid ]; then
          MOCK_PID="$(cat .netconf_mock.pid)"
          if kill -0 "$MOCK_PID" 2>/dev/null; then
            kill "$MOCK_PID"
            wait "$MOCK_PID" || true
          fi
        fi

    - name: Upload NETCONF integration logs
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: netconf-integration-logs
        path: |
          netconf-mock.log
          netconf-mock-state.json
          ci-evpn-vxlan-tf-negative/negative_apply.log
