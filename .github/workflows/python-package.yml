# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 pytest coverage
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --max-complexity=10 --max-line-length=127 --statistics
    - name: Install the module
      run: |
        python -m pip install .
    - name: Test with coverage
      run: |
        coverage run -m pytest -v
        coverage report -m
        coverage xml -i
    - name: Upload coverage report
      uses: actions/upload-artifact@v6
      with:
        name: python-coverage-${{ matrix.python-version }}
        path: coverage.xml
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25.6'
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
    - name: Build and test terraform-provider-junos-vqfx-evpn-vxlan
      working-directory: terraform-provider-junos-vqfx-evpn-vxlan
      run: |
        go build -v ./...
        go test -v ./...
    - name: Generate EVPN-VXLAN Terraform files
      run: |
        jtaf-xml2tf \
          -j terraform-provider-junos-vqfx-evpn-vxlan/trimmed_schema.json \
          -x examples/evpn-vxlan-dc/dc1/*{spine,leaf}*.xml examples/evpn-vxlan-dc/dc2/*spine*.xml \
          -t vqfx-evpn-vxlan \
          -d ci-evpn-vxlan-tf \
          -u ci-user \
          -p ci-password
    - name: Terraform plan with local provider override
      run: |
        pushd terraform-provider-junos-vqfx-evpn-vxlan
        go install .
        popd

        mkdir -p "$HOME/go/bin"
        cat > "$HOME/.terraformrc" <<EOF
        provider_installation {
          dev_overrides {
            "hashicorp/junos-vqfx-evpn-vxlan" = "$HOME/go/bin"
          }
          direct {}
        }
        EOF

        export TF_CLI_CONFIG_FILE="$HOME/.terraformrc"
        pushd ci-evpn-vxlan-tf
        terraform init -no-color
        terraform plan -refresh=false -no-color
        popd
